apiVersion: apps/v1
kind: Deployment
metadata:
  name: vgpu-scheduler
  namespace: vgpu-system
  labels:
    control-plane: vgpu-scheduler
spec:
  # Phase 3.3 HA: one active leader + one hot standby. Failover does not wait
  # for a new pod to be scheduled and pulled.
  replicas: 2
  selector:
    matchLabels:
      control-plane: vgpu-scheduler
  template:
    metadata:
      labels:
        control-plane: vgpu-scheduler
    spec:
      serviceAccountName: vgpu-scheduler-sa
      # Give graceful shutdown time to drain in-flight reconciles and release
      # the leader lease (LeaderElectionReleaseOnCancel) before SIGKILL.
      terminationGracePeriodSeconds: 30
      # Prefer to spread the two replicas across nodes so a single node failure
      # cannot take out both. Preferred (not required) so a single-node cluster
      # can still run both for testing.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  control-plane: vgpu-scheduler
      # Declared restricted profile (the image is distroless nonroot already —
      # this makes the manifest SAY so, so PodSecurity admission can verify it
      # instead of warning on every apply).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: vgpu-scheduler:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        ports:
        - name: metrics
          containerPort: 8081
        - name: health
          containerPort: 8082
        # /healthz = process alive (restart if it deadlocks).
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        # /readyz = safe to hold scheduling responsibility. The leader is not
        # Ready until its cache warm-up completes; a standby is Ready to take over.
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          limits:
            cpu: 500m
            memory: 256Mi # Scheduler needs a bit more RAM for the in-memory cache
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vgpu-scheduler-pdb
  namespace: vgpu-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      control-plane: vgpu-scheduler
