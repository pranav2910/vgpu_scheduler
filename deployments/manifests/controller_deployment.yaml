apiVersion: apps/v1
kind: Deployment
metadata:
  name: vgpu-controller
  namespace: vgpu-system
  labels:
    control-plane: vgpu-controller
spec:
  # Phase 3.3 HA: active leader + hot standby. Both replicas serve the webhook
  # (the webhook Service load-balances across them); only the leader reconciles.
  replicas: 2
  selector:
    matchLabels:
      control-plane: vgpu-controller
  template:
    metadata:
      labels:
        control-plane: vgpu-controller
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: vgpu-controller-sa
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  control-plane: vgpu-controller
      containers:
        - name: manager
          image: vgpu-controller:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: healthz
              containerPort: 8082
              protocol: TCP
          readinessProbe:
            httpGet: { path: /readyz, port: healthz }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: healthz }
            initialDelaySeconds: 15
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          volumeMounts:
            - name: webhook-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: webhook-cert
          secret:
            secretName: vgpu-controller-webhook-cert
            defaultMode: 0440
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vgpu-controller-pdb
  namespace: vgpu-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      control-plane: vgpu-controller
