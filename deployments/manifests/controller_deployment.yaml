apiVersion: apps/v1
kind: Deployment
metadata:
  name: vgpu-controller
  namespace: vgpu-system
  labels:
    control-plane: vgpu-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: vgpu-controller
  template:
    metadata:
      labels:
        control-plane: vgpu-controller
    spec:
      serviceAccountName: vgpu-controller-sa
      containers:
        - name: manager
          image: vgpu-controller:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: healthz
              containerPort: 8082
              protocol: TCP
          readinessProbe:
            httpGet: { path: /readyz, port: healthz }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: healthz }
            initialDelaySeconds: 15
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          volumeMounts:
            - name: webhook-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: webhook-cert
          secret:
            secretName: vgpu-controller-webhook-cert
            defaultMode: 0440
