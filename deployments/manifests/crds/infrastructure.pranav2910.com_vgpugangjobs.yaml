apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vgpugangjobs.infrastructure.pranav2910.com
spec:
  group: infrastructure.pranav2910.com
  names:
    kind: VGPUGangJob
    listKind: VGPUGangJobList
    plural: vgpugangjobs
    singular: vgpugangjob
    shortNames:
      - vgang
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - gangSize
                - minAvailable
                - podTemplate
              properties:
                gangSize:
                  type: integer
                  minimum: 2
                  maximum: 256
                minAvailable:
                  type: integer
                  minimum: 2
                  maximum: 256
                reservationTimeoutSeconds:
                  type: integer
                  minimum: 10
                  maximum: 600
                  default: 60
                priority:
                  type: integer
                  minimum: 0
                  maximum: 1000
                  default: 50
                workloadClass:
                  type: string
                  enum:
                    - Training
                    - Inference
                    - Batch
                    - Interactive
                  default: Training
                preemptible:
                  type: boolean
                  default: false
                preemptionGraceSeconds:
                  type: integer
                  minimum: 1
                  maximum: 3600
                podTemplate:
                  type: object
                  required:
                    - spec
                  properties:
                    spec:
                      type: object
                      required:
                        - requestedVramBytes
                      properties:
                        requestedVramBytes:
                          type: integer
                          format: int64
                          minimum: 1
                        serviceTier:
                          type: string
                          enum:
                            - Guaranteed
                            - BestEffort
                          default: Guaranteed
                        jobRef:
                          type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                reservationRef:
                  type: string
                childrenCreated:
                  type: integer
                childrenRunning:
                  type: integer
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string }
                      status: { type: string }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                      observedGeneration: { type: integer }
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Size
          type: integer
          jsonPath: .spec.gangSize
        - name: Class
          type: string
          jsonPath: .spec.workloadClass
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Running
          type: integer
          jsonPath: .status.childrenRunning
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
