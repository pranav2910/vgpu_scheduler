---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vgpuclaims.infrastructure.pranav2910.com
spec:
  group: infrastructure.pranav2910.com
  names:
    kind: VGPUClaim
    listKind: VGPUClaimList
    plural: vgpuclaims
    singular: vgpuclaim
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: VRAM
          type: integer
          jsonPath: .spec.requestedVramBytes
          description: Requested VRAM bytes
        - name: Tier
          type: string
          jsonPath: .spec.serviceTier
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Slice
          type: string
          jsonPath: .status.boundSliceName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: { type: string }
            kind:       { type: string }
            metadata:   { type: object }
            spec:
              type: object
              required: [requestedVramBytes]
              properties:
                requestedVramBytes:
                  type: integer
                  format: int64
                  minimum: 1
                  maximum: 85899345920
                  description: Requested VRAM in bytes (1 byte – 80 GiB).
                serviceTier:
                  type: string
                  enum: [Guaranteed, BestEffort]
                  default: Guaranteed
                jobRef:
                  type: string
                  description: Name of the parent VGPUJob, if owned by one.
            status:
              type: object
              properties:
                phase:
                  type: string
                  default: Pending
                boundSliceName: { type: string }
                failureReason:  { type: string }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type:    { type: string, maxLength: 316 }
                      status:  { type: string, enum: ["True", "False", "Unknown"] }
                      observedGeneration: { type: integer, format: int64, minimum: 0 }
                      lastTransitionTime: { type: string, format: date-time }
                      reason:  { type: string, minLength: 1, maxLength: 1024 }
                      message: { type: string, maxLength: 32768 }
