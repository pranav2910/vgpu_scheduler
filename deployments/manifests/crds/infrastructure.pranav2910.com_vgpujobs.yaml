apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vgpujobs.infrastructure.pranav2910.com
spec:
  group: infrastructure.pranav2910.com
  names:
    kind: VGPUJob
    listKind: VGPUJobList
    plural: vgpujobs
    singular: vgpujob
    shortNames:
      - vjob
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - claimTemplate
              properties:
                priority:
                  type: integer
                  minimum: 0
                  maximum: 1000
                  default: 50
                workloadClass:
                  type: string
                  enum:
                    - Training
                    - Inference
                    - Batch
                    - Interactive
                  default: Batch
                preemptible:
                  type: boolean
                  default: false
                claimTemplate:
                  type: object
                  required:
                    - spec
                  properties:
                    spec:
                      type: object
                      required:
                        - requestedVramBytes
                      properties:
                        requestedVramBytes:
                          type: integer
                          format: int64
                          minimum: 1
                        serviceTier:
                          type: string
                          enum:
                            - Guaranteed
                            - BestEffort
                          default: Guaranteed
                        jobRef:
                          type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                claimRef:
                  type: string
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string }
                      status: { type: string }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                      observedGeneration: { type: integer }
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Priority
          type: integer
          jsonPath: .spec.priority
        - name: Class
          type: string
          jsonPath: .spec.workloadClass
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Claim
          type: string
          jsonPath: .status.claimRef
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
