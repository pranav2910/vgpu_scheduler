apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vgpu-scheduler-rules
  namespace: default
spec:
  groups:
  - name: vgpu.rules
    rules:
    - alert: VGPUSchedulerDown
      expr: up{job="vgpu-scheduler"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "VGPU Scheduler is down"
        description: "The core bin-packing engine has lost connection."
