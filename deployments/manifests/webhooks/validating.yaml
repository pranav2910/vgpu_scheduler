---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: vgpu-validating-webhook
  annotations:
    cert-manager.io/inject-ca-from: vgpu-system/vgpu-controller-webhook
webhooks:
  - name: vvgpuclaim.vgpu.pranav2910.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: vgpu-controller-webhook
        namespace: vgpu-system
        path: /validate-infrastructure-pranav2910-com-v1alpha1-vgpuclaim
      caBundle: ""
    rules:
      - apiGroups: ["infrastructure.pranav2910.com"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["vgpuclaims"]
  # Gang-job invariants: minAvailable == gangSize (strict gangs — not expressible
  # in OpenAPI validation) and immutability of gangSize/minAvailable/
  # requestedVramBytes after creation. The reconciler ASSUMES these properties;
  # without this entry the handler was served but never invoked, so a mutated
  # gangSize could diverge children from the reservation mid-flight.
  # failurePolicy: Fail — like vgpuclaims, this IS data integrity.
  - name: vvgpugangjob.vgpu.pranav2910.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: vgpu-controller-webhook
        namespace: vgpu-system
        path: /validate-infrastructure-pranav2910-com-v1alpha1-vgpugangjob
      caBundle: ""
    rules:
      - apiGroups: ["infrastructure.pranav2910.com"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["vgpugangjobs"]
  # Phase 3.7 — recommendation enforcement (CREATE) + claimTemplate immutability
  # (UPDATE). CREATE rejects an under-provisioned VGPUJob (vs its learned profile)
  # only in requireOverride mode; UPDATE freezes spec.claimTemplate in every mode
  # (a template edit after admission was accepted-then-silently-ignored — job spec
  # said one size while the live claim/slice held another). failurePolicy: Ignore —
  # advisory + UX honesty, NOT data integrity: the fail-closed CLAIM immutability
  # webhook remains the hard wall protecting the actual grant, so a webhook outage
  # must never block job traffic cluster-wide.
  - name: vvgpujob.vgpu.pranav2910.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    clientConfig:
      service:
        name: vgpu-controller-webhook
        namespace: vgpu-system
        path: /validate-infrastructure-pranav2910-com-v1alpha1-vgpujob
      caBundle: ""
    rules:
      - apiGroups: ["infrastructure.pranav2910.com"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["vgpujobs"]
