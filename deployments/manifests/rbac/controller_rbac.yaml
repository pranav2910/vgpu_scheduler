---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vgpu-controller-role
rules:
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpuclaims", "vgpuslices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpuclaims/status", "vgpuslices/status"]
    verbs: ["get", "update", "patch"]
  # Bug #17: finalizer subresource required for OwnerReferencesPermissionEnforcement.
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpuclaims/finalizers", "vgpuslices/finalizers"]
    verbs: ["update"]
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpujobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpujobs/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpujobs/finalizers"]
    verbs: ["update"]
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpuquotas"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpuquotas/status"]
    verbs: ["get", "update", "patch"]
  # Layer 2 Phase 2.4a: gang scheduling.
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpugangjobs", "vgpugangreservations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpugangjobs/status", "vgpugangreservations/status"]
    verbs: ["get", "update", "patch"]
  # Phase 3.5: Runtime Feedback Engine — the controller is the sole writer of
  # per-workload behavior profiles, aggregated from per-slice runtime stats.
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpuworkloadprofiles"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpuworkloadprofiles/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["infrastructure.pranav2910.com"]
    resources: ["vgpugangjobs/finalizers", "vgpugangreservations/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pods: the webhook reads them (mutating admission path), and — for
  # "VGPUJob owns the Pod" — the controller creates/deletes the workload Pod
  # from a Job's podTemplate (cascade-delete is via OwnerReference).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vgpu-controller-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vgpu-controller-role
subjects:
  - kind: ServiceAccount
    name: vgpu-controller-sa
    namespace: vgpu-system
