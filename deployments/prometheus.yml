# Scrapes every vGPU component by discovering pods through the Kubernetes API
# (mounted kubeconfig). Ports must be NAMED "metrics" in the pod spec — the
# monitor (8083), scheduler (8081), controller (8080) and node agent all are.
global:
  scrape_interval: 15s
scrape_configs:
  - job_name: vgpu
    kubernetes_sd_configs:
      - role: pod
        kubeconfig_file: /etc/prometheus/kubeconfig
        namespaces:
          names: [vgpu-monitor, vgpu-system]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        regex: metrics
        action: keep
      - source_labels: [__meta_kubernetes_namespace]
        target_label: k8s_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: k8s_pod
