services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # kubeconfig for kubernetes_sd pod discovery (user-owned copy, mode 600)
      - ${HOME}/.kube/config:/etc/prometheus/kubeconfig:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    # 🚀 THE LINUX FIX: Tells the container how to reach your host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in your environment (no default shipped)}
    depends_on:
      - prometheus
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
