apiVersion: apps/v1
kind: Deployment
metadata:
  name: vgpu-scheduler
  namespace: vgpu-system
  labels:
    control-plane: vgpu-scheduler
spec:
  # Phase 3.3 HA: one active leader + one hot standby.
  replicas: 2
  selector:
    matchLabels:
      control-plane: vgpu-scheduler
  template:
    metadata:
      labels:
        control-plane: vgpu-scheduler
    spec:
      serviceAccountName: vgpu-scheduler-sa
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  control-plane: vgpu-scheduler
      containers:
      - name: manager
        image: vgpu-scheduler:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: metrics
          containerPort: 8081
        - name: health
          containerPort: 8082
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          limits:
            cpu: 500m
            memory: 256Mi # Scheduler needs a bit more RAM for the in-memory cache
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vgpu-scheduler-pdb
  namespace: vgpu-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      control-plane: vgpu-scheduler
