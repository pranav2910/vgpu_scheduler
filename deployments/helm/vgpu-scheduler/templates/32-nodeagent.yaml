apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vgpu-nodeagent
  namespace: vgpu-system
  labels:
    app: vgpu-nodeagent
spec:
  selector:
    matchLabels:
      app: vgpu-nodeagent
  template:
    metadata:
      labels:
        app: vgpu-nodeagent
    spec:
      serviceAccountName: vgpu-nodeagent-sa
      containers:
      - name: nodeagent
        image: vgpu-nodeagent:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName # Dynamically injects the physical server's name
        securityContext:
          privileged: true # Required to talk directly to NVML and write to host directories
        volumeMounts:
        - name: cdi-dir
          mountPath: /var/run/cdi
        - name: dev-dir
          mountPath: /dev
      volumes:
      - name: cdi-dir
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      - name: dev-dir
        hostPath:
          path: /dev
          type: Directory
