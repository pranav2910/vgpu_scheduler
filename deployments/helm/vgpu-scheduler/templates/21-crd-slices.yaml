---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vgpuslices.infrastructure.pranav2910.com
spec:
  group: infrastructure.pranav2910.com
  names:
    kind: VGPUSlice
    listKind: VGPUSliceList
    plural: vgpuslices
    singular: vgpuslice
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: UUID
          type: string
          jsonPath: .status.deviceUuid
        - name: Alloc
          type: string
          jsonPath: .status.allocationId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: { type: string }
            kind:       { type: string }
            metadata:   { type: object }
            spec:
              type: object
              required: [claimRef, requestedVramBytes]
              properties:
                claimRef:
                  type: string
                  description: Name of the VGPUClaim this slice satisfies.
                nodeName:
                  type: string
                  description: Populated by the scheduler once placement is decided.
                requestedVramBytes:
                  type: integer
                  format: int64
                  minimum: 1
            status:
              type: object
              properties:
                phase:
                  type: string
                  default: Pending
                deviceUuid:     { type: string }
                allocationId:   { type: string }
                allocatedBytes: { type: integer, format: int64 }
                failureReason:  { type: string }
                lastError:      { type: string }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type:    { type: string, maxLength: 316 }
                      status:  { type: string, enum: ["True", "False", "Unknown"] }
                      observedGeneration: { type: integer, format: int64, minimum: 0 }
                      lastTransitionTime: { type: string, format: date-time }
                      reason:  { type: string, minLength: 1, maxLength: 1024 }
                      message: { type: string, maxLength: 32768 }
