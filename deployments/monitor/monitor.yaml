# vGPU monitor mode — the read-only "GPU waste report" wedge.
#
#   READ-ONLY. No scheduling. No pod mutation. No eviction. No CRDs.
#   Runs ALONGSIDE Kubernetes, KAI, Volcano, Run:ai, or Slurm-on-K8s.
#
# It observes real per-GPU + per-process VRAM (NVML), attributes usage to the
# owning pod (PID → cgroup → pod), reads each GPU pod's *requested* VRAM, and
# exports per-pod requested-vs-used metrics. Turn the metrics into a report with:
#
#   vgpu report                          # scrapes these agents, prints the waste table
#   vgpu report --price-per-gpu-hour 3   # estimate $ wasted/month
#
# Install (after building the -tags nvml node agent image on the cluster):
#   kubectl apply -f deployments/monitor/monitor.yaml
#
# RBAC is intentionally minimal: list/watch Pods, nothing else. It cannot create,
# delete, evict, or modify anything.
---
apiVersion: v1
kind: Namespace
metadata:
  name: vgpu-monitor
  labels: { app: vgpu-monitor }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vgpu-monitor
  namespace: vgpu-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vgpu-monitor-readonly
rules:
  # The ONLY permission monitor mode needs: read pods (to map usage → pod and to
  # read each pod's requested GPU memory). No write verbs anywhere.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vgpu-monitor-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vgpu-monitor-readonly
subjects:
  - kind: ServiceAccount
    name: vgpu-monitor
    namespace: vgpu-monitor
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vgpu-monitor
  namespace: vgpu-monitor
  labels: { app: vgpu-monitor }
spec:
  selector:
    matchLabels: { app: vgpu-monitor }
  template:
    metadata:
      labels: { app: vgpu-monitor }
    spec:
      serviceAccountName: vgpu-monitor
      # hostPID lets the agent resolve a GPU process (host PID, from NVML) to its
      # owning pod via /proc/<pid>/cgroup. Read-only.
      hostPID: true
      # Real NVML needs the NVIDIA driver libraries (libnvidia-ml.so.1) injected into
      # the container. On nodes where the nvidia runtime is NOT the default (e.g. k3s +
      # nvidia-container-toolkit), request it explicitly or NVML init fails and the
      # agent degrades to observe-nothing (requested shows, used stays 0). If your
      # node's RuntimeClass has a different name — or nvidia is already the default
      # runtime — adjust or remove this line.
      runtimeClassName: nvidia
      tolerations:
        - operator: Exists   # run on tainted GPU nodes too
      containers:
        - name: monitor
          # Fully-qualified on purpose: the image is built + `k3s ctr images import`'d
          # locally (a10-bootstrap/h100-control-plane build this tag). With
          # imagePullPolicy: Never the kubelet matches by EXACT ref, and the short
          # name `vgpu-nodeagent:nvml` does NOT reliably resolve to a ctr-imported
          # image (you get ErrImageNeverPull even though `crictl images` lists it).
          # The canonical `docker.io/library/…` form matches. On kind, load + use
          # docker.io/library/vgpu-nodeagent:latest (the fake-provider tag).
          image: docker.io/library/vgpu-nodeagent:nvml
          # Never: the image is built + imported locally (k3s ctr import / kind load),
          # never published to a registry — so don't attempt a (doomed) pull.
          imagePullPolicy: Never
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Ask the NVIDIA container toolkit to inject the driver + NVML — read-only.
            # "utility" exposes NVML/nvidia-smi only (no compute, no device-plugin GPU
            # reservation): the monitor OBSERVES the card, it doesn't consume one.
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
            - name: VGPU_MODE
              value: "monitor"            # ← read-only observe/attribute/report; no control plane
            - name: VGPU_OBSERVE_INTERVAL
              value: "30s"
            # Match your scheduler's GPU-memory request annotation (comma-separated).
            # Defaults already include common keys (gpu-memory, run.ai/gpu-memory, …).
            # - name: VGPU_REQUEST_ANNOTATION_KEY
            #   value: "run.ai/gpu-memory"
            # Only used by the non-NVML (kind) image's fake GPU provider:
            - name: VGPU_FAKE_GPU_MEM_BYTES
              value: "85899345920"        # 80 GiB
          ports:
            - name: metrics
              containerPort: 8083
          securityContext:
            privileged: true              # NVML access (read-only GPU telemetry)
          volumeMounts:
            - name: dev-dir
              mountPath: /dev
      volumes:
        - name: dev-dir
          hostPath:
            path: /dev
            type: Directory
